name: 📰 Gerar O Matinal

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC = 3 AM Brasília
  workflow_dispatch:      # Manual trigger
    inputs:
      date:
        description: 'Data para gerar (YYYY-MM-DD, deixe em branco para hoje)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📰 Coletar notícias RSS
        run: |
          cd journal
          npm install
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} npm run scrape ${{ github.event.inputs.date }}

      - name: Setup Ruby / Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 🔨 Build com Jekyll
        run: bundle exec jekyll build

      - name: 📝 Commit nova edição
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "📰 O Matinal"
          git add _journal_articles/
          git commit -m "📰 Gerar O Matinal de $(date +%Y-%m-%d)" || true
          git push
