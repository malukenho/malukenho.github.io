<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Matinal — Arquivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600&family=UnifrakturMaguntia&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #faf7f2;
            --ink: #1a0f0a;
            --rule: #4a3728;
            --accent: #a83a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Crimson Text', Georgia, serif;
            font-size: 17px;
            line-height: 1.75;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--rule);
        }

        h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 64px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 30px;
            margin-bottom: 16px;
            color: var(--accent);
            border-bottom: 1px solid var(--rule);
            padding-bottom: 8px;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .archive-item {
            border: 2px solid var(--rule);
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .archive-item:hover {
            background: rgba(168, 58, 58, 0.08);
            border-color: var(--accent);
        }

        .archive-date {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .archive-title {
            font-size: 14px;
            line-height: 1.4;
            color: var(--ink);
        }

        .archive-item a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        .year-group {
            margin-bottom: 28px;
        }

        .year-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 16px;
            border-top: 2px solid var(--rule);
            font-size: 13px;
            color: var(--rule);
        }

        .back-link {
            text-align: center;
            margin: 20px 0;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .stats {
            background: rgba(168, 58, 58, 0.06);
            border: 1px solid var(--rule);
            padding: 16px;
            text-align: center;
            margin-bottom: 24px;
            border-radius: 2px;
        }

        .stats p {
            margin: 4px 0;
            font-size: 15px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 48px; }
            .archive-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>O Matinal</h1>
        <p class="subtitle">Arquivo de Edições</p>
    </header>

    <div class="back-link">
        <a href="../">← Voltar para Página Principal</a>
    </div>

    <div class="stats">
        <p><strong>Total de Edições: <span id="total-issues">0</span></strong></p>
        <p>Arquivo completo de todas as publicações desde 21 de abril de 2026</p>
    </div>

    <div id="archive-container">
        <!-- Archive items will be dynamically inserted here -->
    </div>

    <footer>
        <p><strong>O Matinal</strong> — Arquivo de Edições</p>
        <p>Todos os artigos linkam às fontes originais</p>
    </footer>

    <script>
        // Sample archive data - in production, this would be generated by CI/CD
        const archiveData = [
            {
                date: '21 de abril de 2026',
                filename: '2026-04-21.html',
                featured: 'Primeira edição de O Matinal'
            },
            {
                date: '20 de abril de 2026',
                filename: '2026-04-20.html',
                featured: 'Dia do Descobrimento do Brasil'
            }
            // More issues would be added here
        ];

        function generateArchive() {
            const container = document.getElementById('archive-container');
            const byYear = {};

            // Group by year
            archiveData.forEach(item => {
                const year = item.date.split(' ')[2];
                if (!byYear[year]) byYear[year] = [];
                byYear[year].push(item);
            });

            // Render by year (newest first)
            Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
                const yearGroup = document.createElement('div');
                yearGroup.className = 'year-group';

                const yearTitle = document.createElement('h2');
                yearTitle.textContent = year;
                yearGroup.appendChild(yearTitle);

                const grid = document.createElement('div');
                grid.className = 'archive-grid';

                byYear[year].forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'archive-item';
                    itemEl.innerHTML = `
                        <a href="${item.filename}">
                            <div class="archive-date">${item.date}</div>
                            <div class="archive-title">${item.featured}</div>
                        </a>
                    `;
                    grid.appendChild(itemEl);
                });

                yearGroup.appendChild(grid);
                container.appendChild(yearGroup);
            });

            document.getElementById('total-issues').textContent = archiveData.length;
        }

        generateArchive();
    </script>

</body>
</html>
